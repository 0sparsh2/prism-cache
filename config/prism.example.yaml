# PRISM-Cache configuration (reference)

org_id: demo-corp
corpus_id: employee-handbook

defaults:
  lane: org-static          # user-private | team | org-static
  sensitivity: low          # low | medium | high
  embed_model_id: text-embedding-3-small
  tier2_similarity_threshold: 0.95

redis:
  url: redis://localhost:6379/0
  tier1_key_prefix: prism:t1
  tier2_key_prefix: prism:t2
  tier3_key_prefix: prism:t3
  # Omit ttl_seconds to rely on corpus_version invalidation only
  ttl_seconds: null

routes:
  coding-assistant:
    lane: user-private
    route_hint: coding
    tier1_enabled: false
  internal-faq-bot:
    lane: org-static
    sensitivity: low
    tier1_enabled: true
    tier2_enabled: true
  program-rag:
    lane: team
    sensitivity: medium
    tier1_enabled: false
