# Phase F — multi-node LMCache scaffold (GPU fleet)
#
# Single-node dev: docker-compose.vllm-lmcache.yml
#
# Cluster profile (experimental — tune for your LMCache version):
#   docker compose -f docker-compose.vllm-lmcache-cluster.yml --profile cluster up
#
# Uses deploy/lmcache-config.remote.yaml (remote_url → lmcache-server)

services:
  lmcache-server:
    profiles: ["cluster"]
    image: lmcache/lmcache-server:latest
    ports:
      - "65432:65432"
    environment:
      LMCACHE_CHUNK_SIZE: "256"
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      interval: 10s
      timeout: 5s
      retries: 3

  vllm-lmcache:
    image: lmcache/vllm-openai:latest
    ports:
      - "8000:8000"
    environment:
      HF_TOKEN: ${HF_TOKEN}
      LMCACHE_CONFIG_FILE: /app/lmcache-config.yaml
    volumes:
      - ./deploy/lmcache-config.yaml:/app/lmcache-config.yaml:ro
      - huggingface-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: >
      meta-llama/Llama-3.1-8B-Instruct
      --host 0.0.0.0
      --port 8000
      --max-model-len 8192
      --kv-transfer-config
      {"kv_connector":"LMCacheConnectorV1","kv_role":"kv_both"}

  vllm-lmcache-cluster:
    profiles: ["cluster"]
    image: lmcache/vllm-openai:latest
    ports:
      - "8001:8000"
    depends_on:
      - lmcache-server
    environment:
      HF_TOKEN: ${HF_TOKEN}
      LMCACHE_CONFIG_FILE: /app/lmcache-config.remote.yaml
    volumes:
      - ./deploy/lmcache-config.remote.yaml:/app/lmcache-config.remote.yaml:ro
      - huggingface-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: >
      meta-llama/Llama-3.1-8B-Instruct
      --host 0.0.0.0
      --port 8000
      --max-model-len 8192
      --kv-transfer-config
      {"kv_connector":"LMCacheConnectorV1","kv_role":"kv_both"}

volumes:
  huggingface-cache:
