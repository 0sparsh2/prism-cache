# LiteLLM gateway — NIM + Gemini (loads all keys from .env)
#
#   set -a && source .env && set +a
#   litellm --config gateway/litellm.multi.yaml --port 4000
#
# Request model: deepseek-v4-flash | gemini-2.5-flash-lite | gemini-embed (embeddings)

model_list:
  - model_name: deepseek-v4-flash
    litellm_params:
      model: nvidia_nim/deepseek-ai/deepseek-v4-flash
      api_key: os.environ/NVIDIA_NIM_API_KEY
      api_base: os.environ/NVIDIA_NIM_API_BASE

  - model_name: gemini-2.5-flash-lite
    litellm_params:
      model: gemini/gemini-2.5-flash-lite
      api_key: os.environ/GEMINI_API_KEY

  # Proxy alias for gemini/gemini-embedding-001 (Tier 2; text-embedding-004 404 on many keys)
  - model_name: gemini-embed
    litellm_params:
      model: gemini/gemini-embedding-001
      api_key: os.environ/GEMINI_API_KEY

litellm_settings:
  drop_params: true
  cache: true
  cache_params:
    type: redis
    host: localhost
    port: "6379"
    namespace: prism:litellm
    default_in_redis_ttl: 3600
  set_verbose: false

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
