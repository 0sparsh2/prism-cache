# LiteLLM gateway — Google Gemini (AI Studio) for PRISM-Cache
#
# Prerequisites:
#   cp .env.example .env   # set GEMINI_API_KEY, GEMINI_MODEL, LITELLM_MASTER_KEY
#   set -a && source .env && set +a
#   docker compose up -d redis   # optional, for LiteLLM Redis cache
#
# Run:
#   litellm --config gateway/litellm.gemini.yaml --port 4000
#
# Clients: http://localhost:4000/v1
# Request model name must match model_name below (default: gemini-2.5-flash-lite).
# Keep GEMINI_MODEL in .env aligned with model_name when you change models.

model_list:
  - model_name: gemini-2.5-flash-lite
    litellm_params:
      model: gemini/gemini-2.5-flash-lite
      api_key: os.environ/GEMINI_API_KEY

litellm_settings:
  drop_params: true
  cache: true
  cache_params:
    type: redis
    host: localhost
    port: "6379"
    namespace: prism:litellm
    default_in_redis_ttl: 3600
  set_verbose: false

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
