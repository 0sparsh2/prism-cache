# LMCache config for vLLM (Phase F) — local CPU tier
# Mount as LMCACHE_CONFIG_FILE in the vLLM container

chunk_size: 256
local_cpu: true
max_local_cpu_size: 5.0

# Multi-node / S3 offload (uncomment for production GPU fleet):
# local_cpu: false
# remote_url: "lm://lmcache-server:65432"
# remote_serde: "cachegen"
