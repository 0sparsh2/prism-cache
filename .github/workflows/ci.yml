name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e ".[dev,config]"

      - name: Run tests
        run: pytest -q

      - name: Governance eval (offline)
        run: python -m eval.run_benchmarks --quiet

      - name: Org scenario smoke
        run: python examples/org_scenario_tier3.py --users 10 --vector-latency-ms 0
